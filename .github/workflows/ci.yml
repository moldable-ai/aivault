name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: |
          cargo fmt --all -- --check
          cargo fmt --manifest-path providers/postgres/Cargo.toml --all -- --check

      - name: Clippy
        run: |
          cargo clippy --all-targets --all-features -- -D warnings
          cargo clippy --manifest-path providers/postgres/Cargo.toml --all-targets -- -D warnings

      - name: Skill docs sync
        run: node scripts/sync-skills.js --check

      - name: Test
        run: |
          cargo test --all-targets
          cargo test --manifest-path providers/postgres/Cargo.toml --all-targets

      - name: Test (release, unit)
        run: cargo test --release --lib

      - name: Test (release, supply-chain contract)
        run: cargo test --release --test release_signing_contract
